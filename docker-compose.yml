services:
  app:
    container_name: tracker_app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT:?required}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      # IANA timezone name (e.g. America/Phoenix), required so the backend's notion
      # of "today" (todayLocal() in routes/helpers.ts) matches the user's actual wall
      # clock. Without this the container defaults to UTC regardless of the host's
      # timezone, which desyncs from the frontend's local-time "today" for part of
      # every day. See Dockerfile for the tzdata package this depends on.
      TZ: "${TZ:?required}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:?required}"
      INITIAL_USER_EMAIL: "${INITIAL_USER_EMAIL:?required}"
      INITIAL_USER_PASSWORD: "${INITIAL_USER_PASSWORD:?required}"
      # v2 §9.4 — optional; the evidence-verification gate has working defaults without these
      NCBI_EUTILS_BASE_URL: "${NCBI_EUTILS_BASE_URL:-}"
      NCBI_API_KEY: "${NCBI_API_KEY:-}"
      NCBI_REQUEST_TIMEOUT_MS: "${NCBI_REQUEST_TIMEOUT_MS:-}"
      # v2 §9.2 / §CLAUDE.md v2 rule 11 — provider-neutral, model choice never frozen in
      # code. Optional: review generation is admin-triggered (not on the app's critical
      # boot path), so nothing here blocks startup — a missing/misconfigured value only
      # fails the specific /admin/generate-reviews call, cleanly, until it's set.
      REVIEW_LLM_PROVIDER: "${REVIEW_LLM_PROVIDER:-anthropic}"
      REVIEW_LLM_MODEL: "${REVIEW_LLM_MODEL:-claude-opus-4-8}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Used only when REVIEW_LLM_PROVIDER=openai-compatible (OpenAI, Gemini's compat
      # endpoint, or a local runtime). If pointing at a model server on the NAS host
      # itself, "localhost" here means THIS CONTAINER — use the host's LAN address or
      # Docker's host-gateway, not localhost, e.g. http://host.docker.internal:11434/v1.
      REVIEW_LLM_BASE_URL: "${REVIEW_LLM_BASE_URL:-}"
      REVIEW_LLM_API_KEY: "${REVIEW_LLM_API_KEY:-}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    container_name: tracker_db
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      # Dev convenience: exposes Postgres on the host for local backend runs and integration tests.
      # Optional in production — comment out this block if direct host DB access is not needed.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?required}
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - tracker_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backup:
    container_name: tracker_backup
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: db
      PGDATABASE: ${POSTGRES_DB:?required}
      PGUSER: ${POSTGRES_USER:?required}
      PGPASSWORD: ${POSTGRES_PASSWORD:?required}
      BACKUP_SCHEDULE: "${BACKUP_SCHEDULE:-0 3 * * *}"
      BACKUP_KEEP_DAYS: "${BACKUP_KEEP_DAYS:-14}"
    volumes:
      - ${BACKUP_DIR:-./backups}:/backups
      - ./scripts/backup-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  tracker_db_data:
